<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christopher Kuthning — Sonnenschutz E'förde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#052625;
    --bg-1:#073334;
    --bg-2:#0a4442;
    --gold:#C5A56C;
    --gold-light:#E3CFA0;
    --gold-dim:rgba(197,165,108,0.35);
    --ink:#EDE7D9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 50% 0%, var(--bg-2) 0%, var(--bg-1) 45%, var(--bg-0) 100%);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    padding:32px 16px;
  }

  .card{
    position:relative;
    width:100%;
    max-width:400px;
    background:linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    border:1px solid var(--gold-dim);
    border-radius:18px;
    padding:44px 32px 32px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(197,165,108,0.06);
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    top:-60%;
    left:-20%;
    width:140%;
    height:160%;
    background:radial-gradient(circle, rgba(197,165,108,0.08) 0%, transparent 60%);
    pointer-events:none;
  }

  /* Signature element: logo built from 4 pleats that unfurl like a plissee opening */
  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:22px;
  }
  .logo-pleats{
    width:74px;
    height:auto;
    filter:drop-shadow(0 4px 14px rgba(197,165,108,0.25));
  }
  .logo-pleats img{
    width:100%;
    display:block;
  }
  .pleat-row{
    transform-origin:top;
    animation:unfurl 900ms cubic-bezier(.16,1,.3,1) both;
  }
  .logo-pleats img{
    clip-path: inset(0 0 0 0);
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  .name{
    font-family:'Jost',sans-serif;
    font-weight:500;
    font-size:28px;
    text-align:center;
    letter-spacing:0.3px;
    color:var(--gold-light);
    margin:0 0 4px;
    animation:fadeUp 600ms ease 120ms both;
  }

  .role{
    text-align:center;
    font-size:13px;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.85;
    margin:0 0 26px;
    animation:fadeUp 600ms ease 200ms both;
  }

  .divider{
    width:36px;
    height:2px;
    background:var(--gold);
    opacity:0.5;
    margin:0 auto 26px;
    animation:fadeUp 600ms ease 260ms both;
  }

  .tagline{
    text-align:center;
    font-size:14.5px;
    line-height:1.55;
    color:var(--ink);
    opacity:0.92;
    margin:0 0 18px;
    animation:fadeUp 600ms ease 320ms both;
  }

  .services{
    text-align:center;
    font-size:13px;
    color:var(--gold-light);
    letter-spacing:0.4px;
    margin:0 0 30px;
    padding:14px 10px;
    border-top:1px solid var(--gold-dim);
    border-bottom:1px solid var(--gold-dim);
    animation:fadeUp 600ms ease 380ms both;
  }

  .contact{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:22px;
    animation:fadeUp 600ms ease 440ms both;
  }

  .contact a{
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--ink);
    text-decoration:none;
    font-size:14.5px;
    padding:10px 12px;
    border-radius:10px;
    background:rgba(197,165,108,0.06);
    border:1px solid transparent;
    transition:border-color 180ms ease, background 180ms ease;
  }
  .contact a:hover{
    border-color:var(--gold-dim);
    background:rgba(197,165,108,0.1);
  }
  .contact svg{
    flex:0 0 auto;
    width:18px;
    height:18px;
    stroke:var(--gold);
  }

  .save-btn{
    text-decoration:none;
    box-sizing:border-box;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px 16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg, var(--gold) 0%, #b3925c 100%);
    color:#062F2C;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14.5px;
    letter-spacing:0.3px;
    cursor:pointer;
    transition:transform 150ms ease, box-shadow 150ms ease;
    animation:fadeUp 600ms ease 500ms both;
  }
  .save-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px -6px rgba(197,165,108,0.5);
  }
  .save-btn:active{
    transform:translateY(0);
  }
  .whatsapp-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:12px 16px;
    margin-top:10px;
    border:1px solid rgba(37,211,102,0.4);
    border-radius:12px;
    background:rgba(37,211,102,0.08);
    color:#8fe3a8;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.2px;
    cursor:pointer;
    transition:background 150ms ease, transform 150ms ease;
    animation:fadeUp 600ms ease 560ms both;
  }
  .whatsapp-btn:hover{
    background:rgba(37,211,102,0.16);
    transform:translateY(-1px);
  }
  .whatsapp-btn svg{
    width:17px;
    height:17px;
    fill:#25D366;
  }

  .save-btn svg{
    width:17px;
    height:17px;
    stroke:#062F2C;
  }

  .footnote{
    text-align:center;
    font-size:10.5px;
    color:var(--gold);
    opacity:0.4;
    margin-top:18px;
    letter-spacing:0.5px;
  }

  @media (max-width:380px){
    .card{padding:36px 22px 26px;}
    .name{font-size:24px;}
  }
</style>
</head>
